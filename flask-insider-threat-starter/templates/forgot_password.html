{% extends "base.html" %}

{% block login_content %}
<style>
    body {
        background-color: #05060A !important;
        font-family: 'Inter', sans-serif;
        position: relative;
        overflow-x: hidden;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&display=swap');

    /* Background Layer */
    .recover-bg {
        position: fixed;
        top: 0; left: 0; width: 100vw; height: 100vh;
        z-index: 0;
        background-color: #05060A;
        overflow: hidden;
    }

    .recover-grid-bg {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background-image: 
            linear-gradient(rgba(179, 0, 255, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(179, 0, 255, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        z-index: 1;
        pointer-events: none;
    }

    .recover-glow {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 800px;
        height: 800px;
        background: radial-gradient(circle, rgba(179, 0, 255, 0.15) 0%, transparent 60%);
        z-index: 1;
        pointer-events: none;
        animation: pulseRecover 6s ease-in-out infinite alternate;
    }

    @keyframes pulseRecover {
        0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.7; }
        100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
    }

    /* Canvas for particles */
    #recover-particles {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: 2;
        pointer-events: none;
    }

    /* Container */
    .recover-container {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 440px;
        padding: 2rem;
        animation: cardEnter 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes cardEnter {
        from { opacity: 0; transform: translateY(30px) scale(0.95); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .recover-card {
        background: rgba(11, 12, 16, 0.5) !important;
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: 1px solid rgba(179, 0, 255, 0.15) !important;
        border-radius: 24px;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(179, 0, 255, 0.15);
        padding: 3.5rem 2.5rem !important;
        position: relative;
        overflow: hidden;
    }

    .recover-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; width: 100%; height: 2px;
        background: linear-gradient(90deg, transparent, #b300ff, #00ffff, transparent);
    }

    .recover-title {
        font-family: 'Syncopate', sans-serif;
        font-weight: 800;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #fff;
        text-align: center;
        margin-bottom: 1rem;
    }

    .recover-subtitle {
        text-align: center;
        font-family: 'Inter', sans-serif;
        color: rgba(255, 255, 255, 0.6);
        font-size: 0.9rem;
        line-height: 1.5;
        margin-bottom: 2.5rem;
    }

    /* Form Fields styling */
    .custom-input {
        background-color: rgba(5, 6, 10, 0.6) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        color: #fff !important;
        border-radius: 12px !important;
        padding: 1rem 1.2rem !important;
        transition: all 0.3s ease;
        font-family: 'Inter', sans-serif;
        font-size: 0.95rem;
    }

    .custom-input:focus {
        border-color: #b300ff !important;
        box-shadow: 0 0 15px rgba(179, 0, 255, 0.2) !important;
        background-color: rgba(5, 6, 10, 0.9) !important;
        outline: none;
    }

    .custom-input::placeholder {
        color: rgba(255, 255, 255, 0.3);
    }

    .input-label {
        color: rgba(255, 255, 255, 0.5) !important;
        padding-left: 1.2rem !important;
        font-size: 0.9rem;
    }

    .form-floating > .form-control:focus ~ label,
    .form-floating > .form-control:not(:placeholder-shown) ~ label {
        transform: scale(0.85) translateY(-0.75rem) translateX(0.15rem) !important;
        color: #b300ff !important;
    }

    .custom-btn {
        background: linear-gradient(90deg, #b300ff, #00ffff) !important;
        border: none !important;
        color: #05060A !important;
        font-family: 'Syncopate', sans-serif;
        font-weight: 800 !important;
        font-size: 0.95rem;
        letter-spacing: 1px;
        text-transform: uppercase;
        border-radius: 12px !important;
        padding: 1.2rem !important;
        box-shadow: 0 10px 20px rgba(179, 0, 255, 0.3) !important;
        transition: all 0.3s ease !important;
        width: 100%;
        margin-top: 1rem;
        cursor: pointer;
    }

    .custom-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 30px rgba(179, 0, 255, 0.5) !important;
    }

    .back-link {
        display: block;
        text-align: center;
        color: rgba(255, 255, 255, 0.5);
        font-size: 0.85rem;
        text-decoration: none;
        margin-top: 1.5rem;
        transition: color 0.3s ease;
    }
    .back-link:hover {
        color: #00ffff;
    }

    .logo-svg {
        display: block;
        margin: 0 auto 1.5rem auto;
        width: 50px;
        height: 50px;
        filter: drop-shadow(0 0 10px rgba(179, 0, 255, 0.6));
    }
</style>

<div class="recover-bg">
    <div class="recover-grid-bg"></div>
    <div class="recover-glow"></div>
    <canvas id="recover-particles"></canvas>
</div>

<div class="recover-container">
    <div class="recover-card">
        <svg class="logo-svg" viewBox="0 0 24 24" fill="none" stroke="#b300ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            <path d="M12 8v4"></path>
            <path d="M12 16h.01"></path>
        </svg>
        
        <h2 class="recover-title">Recover Access</h2>
        <p class="recover-subtitle">Enter your registered email to receive a secure password reset link.</p>

        <form method="POST" action="{{ url_for('auth.forgot_password') }}">
            <div class="form-floating mb-4">
                <input type="email" class="form-control custom-input" id="email" name="email" placeholder="Email Address" required autocomplete="off">
                <label for="email" class="input-label">Email Address</label>
            </div>

            <button type="submit" class="custom-btn">
                Send Reset Link
            </button>
            
            <a href="{{ url_for('auth.login') }}" class="back-link">&larr; Return to Login</a>
        </form>
    </div>
</div>

<script>
    // Particle system for recover page
    const canvas = document.getElementById('recover-particles');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let particles = [];

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
    }

    window.addEventListener('resize', resize);
    resize();

    class Particle {
        constructor() {
            this.x = Math.random() * width;
            this.y = Math.random() * height;
            this.size = Math.random() * 2 + 0.5;
            this.speedX = (Math.random() - 0.5) * 0.5;
            this.speedY = (Math.random() - 0.5) * 0.5;
            this.alpha = Math.random() * 0.5 + 0.1;
            // Primarily purple particles
            this.color = Math.random() > 0.8 ? '#00ffff' : '#b300ff';
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;

            if (this.x < 0) this.x = width;
            if (this.x > width) this.x = 0;
            if (this.y < 0) this.y = height;
            if (this.y > height) this.y = 0;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.globalAlpha = this.alpha;
            ctx.shadowBlur = 10;
            ctx.shadowColor = this.color;
            ctx.fill();
            ctx.globalAlpha = 1.0;
            ctx.shadowBlur = 0;
        }
    }

    for (let i = 0; i < 40; i++) {
        particles.push(new Particle());
    }

    function animate() {
        ctx.clearRect(0, 0, width, height);
        particles.forEach(p => {
            p.update();
            p.draw();
        });
        setTimeout(animate, 1000 / 120);
    }

    animate();
</script>
{% endblock %}
